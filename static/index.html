<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f4f1ea" />
  <title>Skyward — Understand the Elements</title>

  <!--
    PREFIX CONTRACT: every asset path below is RELATIVE (no leading slash), so
    the same HTML resolves correctly at "/" on the Mac and "/skyward/" on the
    Pi. config.js must load FIRST so window.Skyward.url() exists for the rest.

    CACHE-BUSTING: ?v=N on every local asset (the handover-notes fix done
    properly). Bump the number whenever you change a file and Chrome will
    refetch instead of serving a stale copy.
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <!-- PWA: installable app with icon (relative paths — prefix contract holds) -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="static/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Skyward" />

  <link rel="stylesheet" href="static/css/app.css?v=24" />
</head>
<body>
  <div id="app"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- config FIRST (defines Skyward.url / BASE) -->
  <script src="static/js/config.js?v=9"></script>
  <script src="static/js/store.js?v=9"></script>
  <script src="static/js/weather.js?v=11"></script>
  <script src="static/js/iab.js?v=9"></script>
  <script src="static/js/views/map.js?v=25"></script>
  <script src="static/js/views/forecast.js?v=12"></script>
  <script src="static/js/views/webcams.js?v=9"></script>
  <script src="static/js/views/library.js?v=9"></script>
  <script src="static/js/app.js?v=12"></script>
  <script>
    // PWA: register the service worker (relative path — works at / and /skyward/)
    if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
  </script>
</body>
</html>
